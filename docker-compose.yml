services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8081:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
    networks:
      - settlement-network
    volumes:
      - settlement-data:/app/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    depends_on:
      - backend
    networks:
      - settlement-network
    restart: unless-stopped

networks:
  settlement-network:
    driver: bridge

volumes:
  settlement-data:
    driver: local
